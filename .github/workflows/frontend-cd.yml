name: Frontend CD

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-cd.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger Vercel deploy hook
        if: ${{ secrets.VERCEL_DEPLOY_HOOK_URL != '' }}
        run: curl -fsSL -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"

      - name: Skip deploy when hook missing
        if: ${{ secrets.VERCEL_DEPLOY_HOOK_URL == '' }}
        run: echo "VERCEL_DEPLOY_HOOK_URL is not configured, skipping deploy."
